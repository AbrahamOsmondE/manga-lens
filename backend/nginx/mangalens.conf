# /etc/nginx/sites-available/mangalens
# Symlink to /etc/nginx/sites-enabled/mangalens to activate.
#
# Setup steps:
#   sudo cp backend/nginx/mangalens.conf /etc/nginx/sites-available/mangalens
#   sudo ln -s /etc/nginx/sites-available/mangalens /etc/nginx/sites-enabled/mangalens
#   sudo mkdir -p /var/www/manga-lens.com
#   sudo cp ~/manga-lens/website/* /var/www/manga-lens.com/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d api.manga-lens.com -d manga-lens.com -d www.manga-lens.com
#
# After certbot runs it will add the ssl_certificate lines automatically.

# ── api.manga-lens.com — auth proxy ──────────────────────────────────────────

server {
    listen 80;
    server_name api.manga-lens.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# Certbot adds ssl_certificate / ssl_certificate_key / include lines to this block.
server {
    listen 443 ssl;
    server_name api.manga-lens.com;

    location / {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── manga-lens.com — static website ──────────────────────────────────────────

server {
    listen 80;
    server_name manga-lens.com www.manga-lens.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        root /var/www/manga-lens.com;
        index index.html;
        try_files $uri $uri.html $uri/ =404;
    }
}

# The 443 blocks for manga-lens.com and www.manga-lens.com are added by certbot.
