# /etc/nginx/sites-available/mangalens
# Symlink to /etc/nginx/sites-enabled/mangalens to activate.
#
# Setup steps:
#   sudo cp backend/nginx/mangalens.conf /etc/nginx/sites-available/mangalens
#   sudo ln -s /etc/nginx/sites-available/mangalens /etc/nginx/sites-enabled/mangalens
#   sudo mkdir -p /var/www/manga-lens.com
#   sudo cp ~/manga-lens/website/* /var/www/manga-lens.com/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d api.manga-lens.com -d manga-lens.com -d www.manga-lens.com
#
# After certbot runs it will add the ssl_certificate lines automatically.

# ── api.manga-lens.com — auth proxy ──────────────────────────────────────────

server {
    listen 80;
    server_name api.manga-lens.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# The 443 block for api.manga-lens.com is added automatically by certbot.

# ── manga-lens.com — static website ──────────────────────────────────────────

server {
    listen 80;
    server_name manga-lens.com www.manga-lens.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://manga-lens.com$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name www.manga-lens.com;
    # SSL certs added by certbot
    return 301 https://manga-lens.com$request_uri;
}

server {
    listen 443 ssl;
    server_name manga-lens.com;
    # SSL certs added by certbot

    root /var/www/manga-lens.com;
    index index.html;

    # Serve .html files without extension (pricing → pricing.html)
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Cache static assets
    location ~* \.(svg|ico|css|js|png|jpg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
