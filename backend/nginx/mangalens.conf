# /etc/nginx/sites-available/mangalens
# Symlink to /etc/nginx/sites-enabled/mangalens to activate.
#
# Setup steps:
#   sudo cp backend/nginx/mangalens.conf /etc/nginx/sites-available/mangalens
#   sudo ln -s /etc/nginx/sites-available/mangalens /etc/nginx/sites-enabled/mangalens
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d api.manga-lens.com
#
# After certbot runs it will add the ssl_certificate lines automatically.

server {
    listen 80;
    server_name api.manga-lens.com;

    # Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.manga-lens.com;

    # certbot will populate these two lines:
    # ssl_certificate     /etc/letsencrypt/live/api.manga-lens.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.manga-lens.com/privkey.pem;

    # Modern TLS only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    # Allow large image uploads (manga pages can be a few MB)
    client_max_body_size 20M;

    # Pass requests to the FastAPI proxy on localhost:8080
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Translation can take up to 5 minutes
        proxy_read_timeout    300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;
    }
}
