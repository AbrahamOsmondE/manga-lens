version: '3.8'

services:
  translator:
    build: ./translator
    ports:
      - "5003:5003"
    environment:
      - GOOGLE_VISION_API_KEY=${GOOGLE_VISION_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: unless-stopped

  proxy:
    build: ./proxy
    ports:
      - "8080:8080"
    environment:
      - TRANSLATOR_URL=http://translator:5003
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - translator
    restart: unless-stopped
