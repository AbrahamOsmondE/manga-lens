name: Deploy

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    name: Deploy proxy to GCE
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to GCE via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.GCE_IP }}
          username: ${{ secrets.GCE_USER }}
          key:      ${{ secrets.GCE_SSH_KEY }}
          script: |
            set -euo pipefail

            # Pull latest code
            cd ~/manga-lens
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}

            # Rebuild and restart only the proxy (translator keeps running)
            docker-compose up -d --build --no-deps proxy

            # Quick health check — proxy should respond within 10s
            sleep 5
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST http://localhost:8080/translate/image \
              -H "Content-Type: application/json" \
              -d '{}' \
              --max-time 10) || HTTP=000
            echo "Proxy health check: HTTP $HTTP"
            # 401 = auth working correctly; anything else is a problem
            [ "$HTTP" = "401" ] || [ "$HTTP" = "422" ] || exit 1
