<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MangaLens</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 240px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #eee;
      padding: 18px 16px 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
    }
    .logo {
      width: 30px; height: 30px;
      background: #222;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: bold; color: #fff; letter-spacing: 0.5px;
    }
    .title { font-size: 15px; font-weight: 600; color: #fff; }

    /* ── signed-out view ── */
    #view-signout { display: flex; flex-direction: column; gap: 10px; }

    .sign-in-btn {
      width: 100%; padding: 10px;
      background: #fff; color: #333;
      border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background 0.15s;
    }
    .sign-in-btn:hover { background: #e8e8e8; }
    .sign-in-btn svg { flex-shrink: 0; }

    .note { font-size: 11px; color: #666; text-align: center; line-height: 1.4; }

    /* ── signed-in view ── */
    #view-signin { display: none; flex-direction: column; gap: 10px; }

    .user-row {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 11px; color: #888;
    }
    .user-email { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 160px; }
    .sign-out-link {
      font-size: 11px; color: #555; cursor: pointer; text-decoration: underline;
      background: none; border: none; padding: 0; white-space: nowrap;
    }
    .sign-out-link:hover { color: #999; }
    .refresh-btn {
      font-size: 13px; color: #444; cursor: pointer;
      background: none; border: none; padding: 0 2px;
      line-height: 1; transition: color .15s, transform .3s;
    }
    .refresh-btn:hover { color: #888; }
    .refresh-btn.spinning { animation: ml-spin 0.7s linear infinite; color: #666; }

    .tier-badge {
      display: inline-block;
      padding: 2px 7px; border-radius: 10px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .tier-badge.free  { background: #333; color: #aaa; }
    .tier-badge.paid  { background: #1d4ed8; color: #fff; }
    .tier-badge.admin { background: #7c3aed; color: #fff; }

    .quota-row {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 11px; color: #666;
    }
    .quota-bar-wrap {
      height: 4px; background: #2a2a2a; border-radius: 2px; overflow: hidden;
    }
    .quota-bar { height: 100%; background: #2563eb; border-radius: 2px; transition: width 0.3s; }

    .upgrade-link {
      font-size: 11px; color: #2563eb; text-decoration: underline; cursor: pointer;
      background: none; border: none; padding: 0;
      text-align: center; width: 100%;
    }
    .upgrade-link:hover { color: #3b82f6; }

    .toggle-btn {
      width: 100%; padding: 11px;
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .toggle-btn:active { transform: scale(0.97); }
    .toggle-btn.off { background: #2563eb; color: #fff; }
    .toggle-btn.on  { background: #16a34a; color: #fff; }
    .toggle-btn:disabled { background: #333; color: #666; cursor: default; }

    .status-line {
      font-size: 11px; color: #666; text-align: center; min-height: 16px;
    }
    .status-line.warn { color: #f59e0b; }
    .status-line.error { color: #ef4444; }
    .status-line span { color: #ccc; }

    .scan-btn {
      width: 100%; padding: 8px;
      background: transparent; color: #666;
      border: 1px solid #2a2a2a; border-radius: 8px;
      font-size: 12px; cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .scan-btn:hover { background: #1a1a1a; color: #aaa; border-color: #444; }
    .scan-btn:disabled { color: #444; border-color: #1e1e1e; cursor: default; }

    hr { border: none; border-top: 1px solid #222; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">ML</div>
    <div class="title">MangaLens</div>
  </div>

  <!-- Signed-out -->
  <div id="view-signout">
    <button class="sign-in-btn" id="signInBtn">
      <svg width="16" height="16" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Sign in with Google
    </button>
    <p class="note">Sign in to start translating manga pages.</p>
  </div>

  <!-- Signed-in -->
  <div id="view-signin">
    <div class="user-row">
      <span class="user-email" id="userEmail"></span>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="refresh-btn" id="refreshBtn" title="Refresh account">↻</button>
        <button class="sign-out-link" id="signOutBtn">Sign out</button>
      </div>
    </div>

    <div style="display:flex;align-items:center;gap:6px">
      <span class="tier-badge" id="tierBadge">free</span>
      <div class="quota-row" style="flex:1;justify-content:flex-end" id="quotaRow">
        <span id="quotaText"></span>
      </div>
    </div>

    <div class="quota-bar-wrap" id="quotaBarWrap">
      <div class="quota-bar" id="quotaBar" style="width:0%"></div>
    </div>

    <button class="upgrade-link" id="upgradeBtn" style="display:none">
      Upgrade for unlimited translations →
    </button>

    <hr/>

    <button id="toggleBtn" class="toggle-btn off">Enable Translation</button>
    <button id="scanBtn" class="scan-btn" style="display:none">Scan for untranslated images</button>
    <div class="status-line" id="statusLine">Translation is off</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
